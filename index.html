<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Manifold Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            /* พื้นหลังไล่เฉดสีฟ้า-น้ำเงินเข้ม สไตล์ iOS Wallpaper */
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0369a1 100%); 
            text-align: center; 
            margin: 0; 
            padding: 30px 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }

        /* Container สไตล์กระจกใสขัดเงา (Liquid Glass) พร้อมแสงสะท้อนเงา */
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 40px 25px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2); 
        }

        h2 { 
            color: #38bdf8; 
            margin-top: 0; 
            margin-bottom: 8px; 
            font-size: 26px; 
            font-weight: 700; 
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(56, 189, 248, 0.3);
        }

        .subtitle { 
            color: #94a3b8; 
            font-size: 14px; 
            margin-bottom: 35px; 
            letter-spacing: 0.5px;
        }
        
        /* Card แสดงค่าแรงดัน สไตล์กระจกเหลวที่มีมิติความลึกสูง */
        .card { 
            background: linear-gradient(135deg, rgba(2, 136, 209, 0.25) 0%, rgba(0, 86, 145, 0.4) 100%); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px; 
            border-radius: 24px; 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2),
                        inset 0 1px 2px rgba(255, 255, 255, 0.3); 
            text-align: left; 
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* เพิ่มเอฟเฟกต์สะท้อนแสงผิวกระจกด้านบน (Glossy Overlay) */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        .label { 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 25px; 
            color: #bae6fd;
            font-weight: 600; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            padding-bottom: 10px; 
        }

        .value { 
            font-size: 64px; 
            font-weight: 800; 
            letter-spacing: -1px; 
            text-align: center; 
            margin-bottom: 30px; 
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
        }
        
        /* ปุ่มกล่องสถานะสไตล์แคปซูล iOS */
        .status-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 50px;
            text-align: right; 
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: inline-block; 
            margin-left: auto; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Manifold Nitrous Oxide</h2>
        <div class="subtitle">ระบบมอนิเตอร์ค่าแรงดันก๊าซ</div>
        
        <div class="card">
            <div class="label">NITROUS OXIDE PRESSURE</div>
            <div class="value" id="ox_val">0 PSI</div>
            <div id="status_text" class="status-box">สถานะ: กำลังโหลด...</div>
        </div>
    </div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCXKDEy7yerpQCXCocflg9LWjx5dOpCqWw",
    authDomain: "oxegen-monitor.firebaseapp.com",
    databaseURL: "https://oxegen-monitor-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "oxegen-monitor",
    storageBucket: "oxegen-monitor.firebasestorage.app",
    messagingSenderId: "1073586521044",
    appId: "1:1073586521044:web:f2a42d7d7468cb3ea3cc41"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ดึงข้อมูลจาก node data เหมือนเดิม
onValue(ref(db, "data"), (snapshot) => {

    const data = snapshot.val();

    if (!data) return;

    /* เปลี่ยนจาก data.lin เป็น data.left เรียบร้อยแล้ว 
       เพื่อให้สอดคล้องกับข้อมูลที่ส่งมาจากบอร์ด ESP32 ตัวใหม่
    */
    let currentPSI = Math.round(data.left);

    document.getElementById('ox_val').innerText = currentPSI + ' PSI';

    const statusElement = document.getElementById('status_text');

    /* ปรับเกณฑ์การแจ้งเตือนเตือนตามค่าแรงดันซ้าย (Left Bank) 
       โดยอิงเกณฑ์แรงดันต่ำที่ 1000 PSI ตามเงื่อนไขในโค้ด ESP32 ตัวใหม่
    */
    if (currentPSI < 1000) {
        statusElement.innerText = "สถานะ: แรงดันต่ำกว่าเกณฑ์ ⚠️";
        statusElement.style.color = "#ff6b6b"; 
        statusElement.style.backgroundColor = "rgba(255, 107, 107, 0.15)"; 
        statusElement.style.borderColor = "rgba(255, 107, 107, 0.2)";
    } else {
        statusElement.innerText = "สถานะ: ปกติ ✨";
        statusElement.style.color = "#2ecc71"; 
        statusElement.style.backgroundColor = "rgba(46, 204, 113, 0.15)"; 
        statusElement.style.borderColor = "rgba(46, 204, 113, 0.2)";
    }
});

</script>
</body>
</html>
