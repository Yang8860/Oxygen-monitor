<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Oxygen Manifold Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            text-align: center; 
            margin: 0; 
            padding: 30px 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 90vh; 
        }
        .container { 
            width: 100%; 
            max-width: 750px; 
            background: white; 
            padding: 35px 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
        }
        h2 { 
            color: #1a73e8; 
            margin-top: 0; 
            margin-bottom: 5px; 
            font-size: 22px; 
            font-weight: 600; 
        }
        .subtitle { 
            color: #70757a; 
            font-size: 14px; 
            margin-bottom: 25px; 
        }
        .main-line-card { 
            background: linear-gradient(135deg, #37474f 0%, #212121 100%); 
            padding: 25px 20px; 
            border-radius: 16px; 
            color: white; 
            font-weight: bold; 
            margin-bottom: 25px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
        }
        .main-line-val { 
            font-size: 64px; 
            font-weight: 700; 
            color: #00e676; 
            margin-top: 10px; 
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.3); 
        }
        .grid { 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
        }
        .card { 
            flex: 1; 
            min-width: 280px; 
            padding: 30px 20px; 
            border-radius: 16px; 
            color: white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            text-align: left; 
        }
        .left-bank { background: linear-gradient(135deg, #0288d1 0%, #005691 100%); }
        .right-bank { background: linear-gradient(135deg, #009688 0%, #00695c 100%); }
        .label { 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-bottom: 15px; 
            opacity: 0.85; 
            font-weight: 600; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            padding-bottom: 5px; 
        }
        .value { 
            font-size: 40px; 
            font-weight: 700; 
            letter-spacing: 0.5px; 
            text-align: center; 
            margin-bottom: 15px; 
        }
        .progress-container { 
            background: rgba(255,255,255,0.25); 
            border-radius: 10px; 
            height: 12px; 
            width: 100%; 
            overflow: hidden; 
            margin-top: 5px; 
        }
        .progress-bar { 
            background: #ffeb3b; 
            height: 100%; 
            width: 0%; 
            border-radius: 10px; 
            transition: width 0.5s ease-in-out; 
        }
        .pct-text { 
            font-size: 14px; 
            text-align: right; 
            margin-top: 8px; 
            font-weight: 500; 
            opacity: 0.95; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>ห้องระบบสำรองก๊าซออกซิเจนทางการแพทย์ อาคารสมเด็จย่า</h2>
        <div class="subtitle">ระบบมอนิเตอร์ค่าแรงดันออกซิเจน ซ้าย-ขวา</div>
        <div class="main-line-card">
            <div style="font-size: 13px; letter-spacing: 1.5px; opacity: 0.8;">OXYGEN TOTAL CAPACITY</div>
            <div class="main-line-val" id="ox_lin">...</div>
        </div>
        <div class="grid">
            <div class="card left-bank">
                <div class="label">LEFT BANK (ฝั่งซ้าย)</div>
                <div class="value" id="ox_left">0 PSI</div>
                <div class="progress-container"><div id="bar_left" class="progress-bar"></div></div>
                <div id="txt_left" class="pct-text">ปริมาณก๊าซ: 0%</div>
            </div>
            <div class="card right-bank">
                <div class="label">RIGHT BANK (ฝั่งขวา)</div>
                <div class="value" id="ox_right">0 PSI</div>
                <div class="progress-container"><div id="bar_right" class="progress-bar"></div></div>
                <div id="txt_right" class="pct-text">ปริมาณก๊าซ: 0%</div>
            </div>
        </div>
    </div>
    <script>
        function updateData() {
            fetch('/data')
            .then(response => response.json())
            .then(data => {
                let pctLeft = Math.round((data.left / 2500) * 100);
                let pctRight = Math.round((data.right / 2500) * 100);
                
                if(pctLeft > 100) pctLeft = 100; if(pctLeft < 0) pctLeft = 0;
                if(pctRight > 100) pctRight = 100; if(pctRight < 0) pctRight = 0;
                
                let mainPct = Math.round(data.lin);
                document.getElementById('ox_lin').innerText = mainPct + ' %';
                
                if(mainPct < 20) { 
                    document.getElementById('ox_lin').style.color = '#ff1744'; 
                } else { 
                    document.getElementById('ox_lin').style.color = '#00e676'; 
                }
                
                document.getElementById('ox_left').innerText = Math.round(data.left) + ' PSI';
                document.getElementById('bar_left').style.width = pctLeft + '%';
                document.getElementById('txt_left').innerText = 'ปริมาณก๊าซ: ' + pctLeft + '%';
                
                document.getElementById('ox_right').innerText = Math.round(data.right) + ' PSI';
                document.getElementById('bar_right').style.width = pctRight + '%';
                document.getElementById('txt_right').innerText = 'ปริมาณก๊าซ: ' + pctRight + '%';
            })
            .catch(err => console.error("Error fetching data:", err));
        }
        setInterval(updateData, 1000);
        window.onload = updateData;
    </script>
</body>
</html>
