<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Manifold Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            text-align: center; 
            margin: 0; 
            padding: 30px 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 90vh; 
        }
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: white; 
            padding: 35px 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
        }
        h2 { 
            color: #1a73e8; 
            margin-top: 0; 
            margin-bottom: 5px; 
            font-size: 22px; 
            font-weight: 600; 
        }
        .subtitle { 
            color: #70757a; 
            font-size: 14px; 
            margin-bottom: 25px; 
        }
        
        .card { 
            background: linear-gradient(135deg, #0288d1 0%, #005691 100%); 
            padding: 40px 25px; 
            border-radius: 16px; 
            color: white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            text-align: left; 
            display: flex;
            flex-direction: column;
        }
        .label { 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-bottom: 20px; 
            opacity: 0.9; 
            font-weight: 600; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            padding-bottom: 8px; 
        }
        .value { 
            font-size: 56px; 
            font-weight: 700; 
            letter-spacing: 0.5px; 
            text-align: center; 
            margin-bottom: 25px; 
            line-height: 1;
        }
        
        /* ปรับสไตล์ช่องแสดงสถานะให้ขยับไปชิดขอบขวาล่างสุด (margin-left: auto) */
        .status-box {
            background: rgba(255, 255, 255, 0.12);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: right; 
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: inline-block; 
            margin-left: auto; /* ดันกล่องไปทางขวาสุด */
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Manifold Nitrous Oxide</h2>
        <div class="subtitle">ระบบมอนิเตอร์ค่าแรงดันก๊าซ</div>
        
        <div class="card">
            <div class="label">LINE PRESSURE (แรงดันระบบ)</div>
            <div class="value" id="ox_val">0 PSI</div>
            <div id="status_text" class="status-box">สถานะ: กำลังโหลด...</div>
        </div>
    </div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCXKDEy7yerpQCXCocflg9LWjx5dOpCqWw",
    authDomain: "oxegen-monitor.firebaseapp.com",
    databaseURL: "https://oxegen-monitor-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "oxegen-monitor",
    storageBucket: "oxegen-monitor.firebasestorage.app",
    messagingSenderId: "1073586521044",
    appId: "1:1073586521044:web:f2a42d7d7468cb3ea3cc41"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db, "data"), (snapshot) => {

    const data = snapshot.val();

    if (!data) return;

    let currentPSI = Math.round(data.lin);

    document.getElementById('ox_val').innerText = currentPSI + ' PSI';

    const statusElement = document.getElementById('status_text');

    // ตรวจสอบเงื่อนไขการแจ้งเตือนสีแดง/เขียวแบบชิดขวา
    if (currentPSI < 45) {
        statusElement.innerText = "สถานะ: แรงดันต่ำเกินไป (ไม่ปกติ)";
        statusElement.style.color = "#ff4d4d"; 
        statusElement.style.backgroundColor = "rgba(255, 77, 77, 0.15)"; 
    } else if (currentPSI > 65) {
        statusElement.innerText = "สถานะ: แรงดันสูงเกินไป (ไม่ปกติ)";
        statusElement.style.color = "#ff4d4d"; 
        statusElement.style.backgroundColor = "rgba(255, 77, 77, 0.15)";
    } else {
        statusElement.innerText = "สถานะ: ปกติ";
        statusElement.style.color = "#00e676"; 
        statusElement.style.backgroundColor = "rgba(0, 230, 118, 0.12)"; 
    }
});

</script>
</body>
</html>
